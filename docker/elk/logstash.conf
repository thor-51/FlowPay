# Used only when the optional "elk" docker-compose profile is active
# (docker compose --profile elk up -d). See README "Observability" section for why this is
# opt-in rather than part of the default stack.

input {
  file {
    path => "/app/logs/application.log"
    start_position => "beginning"
    # Disables Logstash's position-tracking sincedb so a restarted container always re-reads
    # the file from the top. Fine for a local/demo setup where re-ingesting a few thousand log
    # lines costs nothing; a real deployment would want this pointed at a persistent path instead.
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  # net.logstash.logback's LogstashEncoder (see logback-spring.xml) already emits a
  # fully-formed Logstash-shaped JSON document per line — @timestamp, @version, level,
  # logger_name, thread_name, message, stack_trace (on exceptions), plus our custom
  # "application" and "correlationId" fields. No grok parsing is needed. This block is left as
  # a placeholder for enrichments, e.g.:
  #
  # mutate {
  #   add_field => { "environment" => "local" }
  # }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "transaction-processing-system-%{+YYYY.MM.dd}"
  }

  # Uncomment to debug the pipeline itself by echoing every event to the logstash container's
  # own stdout, visible via `docker compose logs -f logstash`:
  # stdout { codec => rubydebug }
}
