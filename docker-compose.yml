version: "3.9"

# Usage:
#   Core stack only:           docker compose up -d
#   With ELK log aggregation:  docker compose --profile elk up -d
# See README.md "Observability" section for details on why ELK is opt-in (resource heavy).

services:
  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tps-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/tps_db
      DB_USERNAME: tps_user
      DB_PASSWORD: tps_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret-key-minimum-256-bits-long-please}
      LOG_PATH: /app/logs
      NEW_RELIC_ENABLED: ${NEW_RELIC_ENABLED:-false}
      NEW_RELIC_LICENSE_KEY: ${NEW_RELIC_LICENSE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - tps-network
    volumes:
      - app-logs:/app/logs

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tps_db
      POSTGRES_USER: tps_user
      POSTGRES_PASSWORD: tps_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tps_user -d tps_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tps-network

  # ---------------------------------------------------------------------------
  # Redis (idempotency keys, distributed locks)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tps-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tps-network

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode - no Zookeeper needed on modern Kafka, but Zookeeper
  # is included as a comment below for environments pinned to older images)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: tps-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - tps-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tps-kafka-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - tps-network

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tps-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - tps-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tps-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tps-network

  # ---------------------------------------------------------------------------
  # ELK stack (optional, behind "elk" profile - run with --profile elk)
  # The app already emits JSON logs (see logback-spring.xml) so Filebeat/Logstash
  # can ingest them directly; ELK itself is opt-in because it's resource-heavy
  # for a local dev machine. See README "Observability" section.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: tps-elasticsearch
    restart: unless-stopped
    profiles: ["elk"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - tps-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: tps-logstash
    restart: unless-stopped
    profiles: ["elk"]
    volumes:
      - ./docker/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - app-logs:/app/logs:ro
    depends_on:
      - elasticsearch
    networks:
      - tps-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: tps-kibana
    restart: unless-stopped
    profiles: ["elk"]
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - tps-network

networks:
  tps-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  app-logs:
  es-data:
